<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">回忆在改写</title>
  <desc id="desc">医美消费中的记忆重写：高峰、最近的照片和既有选择如何影响对整段经历的判断。</desc>
  <rect width="1600" height="1000" fill="#F7F1E8"/>
  <rect x="86" y="90" width="18" height="720" fill="#9B9A66"/>
  <text x="150" y="170" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700" letter-spacing="2">04 / 记忆重写</text>
  <text x="150" y="252" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="64" font-weight="700">回忆在改写</text>
  <text x="150" y="310" fill="#68717A" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">经历结束后，人常用一次高峰、最新画面或既有选择，替整段过程下结论。</text>
  <g transform="translate(150 405)">
    <rect width="310" height="90" rx="45" fill="#ECEAD8"/><text x="36" y="57" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">认知失调</text>
    <rect x="340" width="310" height="90" rx="45" fill="#ECEAD8"/><text x="376" y="57" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">享乐适应</text>
    <rect x="680" width="310" height="90" rx="45" fill="#ECEAD8"/><text x="716" y="57" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">峰终定律</text>
    <rect y="120" width="310" height="90" rx="45" fill="#ECEAD8"/><text x="36" y="177" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">近因偏误</text>
    <rect x="340" y="120" width="310" height="90" rx="45" fill="#ECEAD8"/><text x="376" y="177" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">选择支持</text>
  </g>
  <rect x="1140" y="400" width="230" height="250" rx="14" fill="#9B9A66" opacity=".18"/>
  <rect x="1180" y="438" width="150" height="150" rx="8" fill="none" stroke="#9B9A66" stroke-width="8"/>
  <path d="M 1215 570 C 1245 520, 1270 620, 1300 480" fill="none" stroke="#9B9A66" stroke-width="8"/>
  <text x="150" y="760" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">停顿一句</text>
  <text x="150" y="822" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="42">「我是在处理事实，还是在重写一个故事？」</text>
  <text x="150" y="900" fill="#68717A" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">把感受、恢复、医疗事实和追加消费拆开处理。</text>
</svg>

