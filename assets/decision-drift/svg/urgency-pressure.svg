<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">下手太急</title>
  <desc id="desc">医美消费中的行动压力：价格、限时、损失感和既有投入如何压缩思考。</desc>
  <rect width="1600" height="1000" fill="#F7F1E8"/>
  <rect x="86" y="90" width="18" height="720" fill="#C9835A"/>
  <text x="150" y="170" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700" letter-spacing="2">03 / 行动压力</text>
  <text x="150" y="252" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="64" font-weight="700">下手太急</text>
  <text x="150" y="310" fill="#68717A" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">当立即得到的承诺压过未来的恢复、资金和退出成本，选择会变得很窄。</text>
  <g transform="translate(150 405)">
    <rect width="290" height="90" rx="45" fill="#F3E3D5"/><text x="36" y="57" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">锚定效应</text>
    <rect x="320" width="290" height="90" rx="45" fill="#F3E3D5"/><text x="356" y="57" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">稀缺效应</text>
    <rect x="640" width="290" height="90" rx="45" fill="#F3E3D5"/><text x="676" y="57" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">损失厌恶</text>
    <rect y="120" width="290" height="90" rx="45" fill="#F3E3D5"/><text x="36" y="177" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">现在偏误</text>
    <rect x="320" y="120" width="290" height="90" rx="45" fill="#F3E3D5"/><text x="356" y="177" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">沉没成本</text>
    <rect x="640" y="120" width="290" height="90" rx="45" fill="#F3E3D5"/><text x="676" y="177" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">诱饵效应</text>
    <rect y="240" width="290" height="90" rx="45" fill="#F3E3D5"/><text x="36" y="297" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">默认效应</text>
  </g>
  <path d="M 1140 400 h 230 v 250 h -230 z" fill="#C9835A" opacity=".20"/>
  <path d="M 1195 462 h 120 v 124 h -120 z" fill="none" stroke="#C9835A" stroke-width="8"/>
  <path d="M 1255 428 v 42 M 1255 578 v 42 M 1160 524 h 42 M 1308 524 h 42" stroke="#C9835A" stroke-width="8"/>
  <text x="150" y="760" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">停顿一句</text>
  <text x="150" y="822" fill="#26313F" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="42">「这是医疗需要，还是一份成交安排？」</text>
  <text x="150" y="900" fill="#68717A" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="32">让未来的日历、预算和退出条件也坐到咨询桌前。</text>
</svg>

